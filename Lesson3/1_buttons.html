<style>
    .subscribe-button
    {
        background-color: red;
        color: white;
        padding: 5px;
        height: 36px;
        width: 105px;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        margin-right: 10px;
        transition: opacity 0.15s;
    }
    
    .join-button 
    {
        background-color: white;
        border-color: blue;
        color: blue;
        height: 40px;
        width: 100px;
        border-width: 1px;
        border-style: solid;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 10px;
        transition: background-color 0.15s, color 0.15s;
    }

    .tweet-button
    {
        color: white;
        background-color: rgb(0, 106, 255);
        border: none;
        border-radius: 18px;
        cursor: pointer;
        height: 36px;
        width: 74px;
        font-weight: bold;
        font-size: 15px;
        /* horizontal-position vertical-position blur and color  */
        /* box-shadow: 10px 10px 10px black; */

        /* color, color, color, a value  */
        /* box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15); */
        transition: box-shadow 0.15s;
    }

    .tweet-button:hover
    {
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
    }

    /* : hover is known as a pseudo class  */
    /* .subscribe-button:hover
    {
        background-color: green;
    }

    .subscribe-button:active
    {
        background-color: blue;
    } */

    .subscribe-button:hover
    {
        /* opacity ranges from 0 to 1  */
        opacity: 0.8;
    }

    .subscribe-button:active
    {
        opacity: 0.5;
    }

    .join-button:hover
    {
        background-color: rgb(41, 118, 211);
        color: white;
    }

    .join-button:active
    {
        opacity: 0.7;
    }



</style>

<button class="subscribe-button">SUBSCRIBE</button>
<button class="join-button">JOIN</button>
<button class="tweet-button">Tweet</button>
