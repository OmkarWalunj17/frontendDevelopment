<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube.com Clone</title>
    <link rel="stylesheet" href="styles/youtube.css">
    <style>
        .thumbnail{
            width: 300px;
            display: block;
        }

        .video-title{
            width:300px;
        }

        
    </style>
    
</head>
<body>
    <input class="search-bar" type="text" placeholder="Search">
    <img class="thumbnail" src="thumbnails/thumbnail-1.webp" alt="SundarPichai">
    <p class="video-title">
        Talking Tech and AI with Google CEO Sundar Pichai!
    </p>

    <p class="video-author">
        Marques Brownlee
    </p>

    <p class="video-stats">
        3.4M views &#183; 6 months ago
    </p>
</body>
</html>

<!-- Types of HTML elements  -->
<!-- 1. Block Elements -- consumes entire block -->
<!-- 2. Inline-Block Elements -- consumes only the required block space and not the entire block -->
<!-- 3. Inline Elements -- consumes only inline space -->
