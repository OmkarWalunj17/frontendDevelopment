<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise4</title>
    <style>
        .firstName{
            display: inline-block;
            width: 150px;
            color: gray;
            padding: 15px;
            border-radius: 10px;
            border-color: gray;
            border-style: solid;
            border-width: 1px;
        }
        
        .lastName{
            display: inline-block;
            width: 150px;
            color: gray;
            padding: 15px;
            border-radius: 10px;
            border-color: gray;
            border-style: solid;
            border-width: 1px;
        }
        .email{
            margin-top: 10px;
            display: block;
            width: 335px;
            color: gray;
            padding: 15px;
            border-radius: 10px;
            border-color: gray;
            border-style: solid;
            border-width: 1px;
        }

        .signup{
            margin-top: 10px;
            font-weight: bold;
            display: block;
            width: 365px;
            color: white;
            background-color: rgb(40, 108, 255);
            border-radius: 10px;
            padding: 15px;
        }
    </style>
</head>
<body>
    <input class="firstName" type="text" placeholder="First Name">
    <input class="lastName" type="text" placeholder="Last Name">
    <input class="email" type="text" placeholder="Email">
    <button class="signup">Sign Up</button>
</body>
</html>
