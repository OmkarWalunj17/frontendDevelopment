<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise5</title>
    <style>
        .pickup{
            display: block;
            width: 500px;
            padding: 10px;
            border-radius: 10px;
            border-width: 1px;
        }
        
        .destination{
            margin-top: 10px;
            display:block;
            width: 500px;
            padding: 10px;
            border-radius: 10px;
            border-width: 1px;
        }

        .request-now{
            margin-top: 10px;
            display: inline-block;
            width: 260px;
            background-color: black;
            color: white;
            font-weight: bold;
            padding: 10px;
            border-radius: 10px;
            border-width: 1px;
        }
        
        .schedule-later{
            margin-top: 10px;
            display: inline-block;
            width: 260px;
            padding: 10px;
            border-radius: 10px;
            border-width: 1px;
        }
    </style>
</head>
<body>
    <h1>Request a ride now</h1>
    <input class="pickup" type="text" placeholder="Enter pickup location">
    <input class="destination" type="text" placeholder="Enter destination">

    <button class="request-now">Request Now</button>
    <button class="schedule-later">Schedule for later</button>
</body>
</html>
